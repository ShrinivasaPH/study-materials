<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Quest — Learn Data Structures & Algorithms the Fun Way</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F7FB;
  --card:#FFFFFF;
  --ink:#232946;
  --muted:#5F6680;
  --line:#E6E8F2;
  --primary:#5A5FE0;
  --primary-soft:#EEEFFF;
  --primary-dark:#4348BD;
  --green:#22B573;
  --green-soft:#E5F8EF;
  --gold:#FFB100;
  --gold-soft:#FFF4D8;
  --red:#F25C5C;
  --red-soft:#FEECEC;
  --teal:#12A5B4;
  --purple:#8B5CF6;
  --orange:#F97B3D;
  --navy:#20243B;
  --navy-2:#2A2F4E;
  --radius:18px;
  --shadow:0 1px 2px rgba(35,41,70,.05),0 6px 18px rgba(35,41,70,.07);
  --shadow-lift:0 4px 10px rgba(35,41,70,.08),0 14px 34px rgba(35,41,70,.13);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  font-size:16.5px;
  line-height:1.65;
}
h1,h2,h3,h4,.display{font-family:'Baloo 2',cursive}
button{font-family:inherit;cursor:pointer;border:none;background:none}
::selection{background:var(--primary-soft)}

/* ---------- Layout ---------- */
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
.sidebar{
  background:var(--navy);
  color:#C9CDE8;
  padding:26px 18px;
  position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:6px;
}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:22px;padding:0 8px}
.logo-badge{
  width:42px;height:42px;border-radius:13px;
  background:linear-gradient(135deg,var(--primary),var(--purple));
  display:grid;place-items:center;font-size:22px;
  box-shadow:0 4px 12px rgba(90,95,224,.45);
}
.logo h1{font-size:21px;color:#fff;letter-spacing:.3px}
.logo span{color:var(--gold)}
.nav-btn{
  display:flex;align-items:center;gap:12px;width:100%;
  padding:11px 14px;border-radius:12px;color:#B9BEDF;
  font-weight:700;font-size:15px;text-align:left;
  transition:background .15s,color .15s;
}
.nav-btn:hover{background:var(--navy-2);color:#fff}
.nav-btn.active{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(90,95,224,.4)}
.nav-btn .ico{font-size:19px;width:24px;text-align:center}
.side-stats{
  margin-top:auto;background:var(--navy-2);border-radius:14px;padding:14px;
  display:flex;flex-direction:column;gap:10px;font-size:14px;
}
.side-stats .row{display:flex;justify-content:space-between;align-items:center}
.side-stats .val{color:#fff;font-weight:800}
.main{padding:0 clamp(16px,4vw,56px) 90px;max-width:1060px;width:100%;margin:0 auto}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  background:rgba(246,247,251,.85);backdrop-filter:blur(10px);
  display:flex;align-items:center;gap:14px;
  padding:16px 4px;margin-bottom:8px;border-bottom:1px solid var(--line);
}
.topbar .search{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--card);border:2px solid var(--line);border-radius:14px;
  padding:9px 14px;transition:border-color .15s;
}
.topbar .search:focus-within{border-color:var(--primary)}
.topbar input{border:none;outline:none;font:inherit;width:100%;background:transparent;color:var(--ink)}
.stat-pill{
  display:flex;align-items:center;gap:7px;font-weight:800;font-size:15px;
  background:var(--card);border:2px solid var(--line);
  padding:8px 14px;border-radius:14px;white-space:nowrap;
}
.stat-pill.xp{color:var(--gold)}
.stat-pill.streak{color:var(--orange)}
.stat-pill.done{color:var(--green)}

/* ---------- Path (home) ---------- */
.hero{
  background:linear-gradient(120deg,var(--primary) 0%,var(--purple) 100%);
  color:#fff;border-radius:24px;padding:30px 34px;margin:18px 0 34px;
  display:flex;align-items:center;gap:22px;flex-wrap:wrap;
  box-shadow:var(--shadow-lift);position:relative;overflow:hidden;
}
.hero::after{
  content:"";position:absolute;right:-60px;top:-60px;width:230px;height:230px;
  border-radius:50%;background:rgba(255,255,255,.12);
}
.hero::before{
  content:"";position:absolute;right:40px;bottom:-90px;width:180px;height:180px;
  border-radius:50%;background:rgba(255,255,255,.09);
}
.hero h2{font-size:clamp(24px,3.4vw,34px);line-height:1.15;margin-bottom:6px}
.hero p{opacity:.92;max-width:560px;font-size:16px}
.hero .mascot{font-size:64px;filter:drop-shadow(0 8px 14px rgba(0,0,0,.25));animation:float 3.4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero .cta{
  background:#fff;color:var(--primary-dark);font-family:'Baloo 2';font-size:17px;
  padding:12px 24px;border-radius:14px;font-weight:700;
  box-shadow:0 5px 0 rgba(0,0,0,.16);transition:transform .12s;
  position:relative;z-index:1;
}
.hero .cta:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.16)}

.section-label{
  display:flex;align-items:center;gap:12px;margin:34px 0 4px;
  color:var(--muted);font-weight:800;font-size:13px;letter-spacing:1.6px;text-transform:uppercase;
}
.section-label::after{content:"";flex:1;height:2px;background:var(--line);border-radius:2px}

.path{display:flex;flex-direction:column;align-items:center;padding:26px 0 10px;position:relative}
.path-node{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  margin-bottom:34px;position:relative;transition:transform .15s;
}
.path-node:nth-child(4n+1){transform:translateX(-90px)}
.path-node:nth-child(4n+2){transform:translateX(0)}
.path-node:nth-child(4n+3){transform:translateX(90px)}
.path-node:nth-child(4n+4){transform:translateX(0)}
.node-circle{
  width:84px;height:84px;border-radius:50%;
  display:grid;place-items:center;font-size:34px;position:relative;
  background:var(--card);border:none;
  box-shadow:0 6px 0 var(--line),var(--shadow);
  transition:transform .12s,box-shadow .12s;
}
.node-circle:hover{transform:translateY(-3px)}
.node-circle:active{transform:translateY(4px);box-shadow:0 1px 0 var(--line)}
.node-circle .ring{position:absolute;inset:-9px;pointer-events:none}
.node-circle.completed{
  background:linear-gradient(135deg,var(--gold),#FFCF4D);
  box-shadow:0 6px 0 #D89A0C,var(--shadow);
}
.node-circle.current{
  background:linear-gradient(135deg,var(--green),#3AD98E);
  box-shadow:0 6px 0 #158552,var(--shadow);
}
.node-check{
  position:absolute;bottom:-4px;right:-4px;width:28px;height:28px;border-radius:50%;
  background:var(--green);color:#fff;display:grid;place-items:center;
  font-size:15px;font-weight:900;border:3px solid var(--bg);
}
.start-tip{
  position:absolute;top:-46px;left:50%;transform:translateX(-50%);
  background:#fff;color:var(--green);font-family:'Baloo 2';font-weight:700;
  padding:6px 16px;border-radius:12px;font-size:14px;letter-spacing:1px;
  box-shadow:var(--shadow-lift);animation:bob 1.2s ease-in-out infinite;white-space:nowrap;
}
.start-tip::after{
  content:"";position:absolute;left:50%;bottom:-6px;transform:translateX(-50%) rotate(45deg);
  width:12px;height:12px;background:#fff;
}
@keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,-6px)}}
.node-meta{text-align:center;max-width:190px}
.node-meta .t{font-family:'Baloo 2';font-weight:700;font-size:16px;line-height:1.25}
.node-meta .s{font-size:12.5px;color:var(--muted);font-weight:600}
.node-xp{
  font-size:11.5px;font-weight:800;color:var(--gold);
  background:var(--gold-soft);border-radius:20px;padding:2px 10px;margin-top:3px;display:inline-block;
}

/* ---------- Lesson page ---------- */
.lesson-head{
  border-radius:24px;padding:30px 34px;margin:18px 0 26px;color:#fff;
  box-shadow:var(--shadow-lift);position:relative;overflow:hidden;
}
.lesson-head .crumb{
  display:inline-flex;align-items:center;gap:6px;color:#fff;
  background:rgba(255,255,255,.18);padding:7px 15px;border-radius:12px;
  font-weight:800;font-size:13.5px;margin-bottom:14px;transition:background .15s;
}
.lesson-head .crumb:hover{background:rgba(255,255,255,.3)}
.lesson-head h2{font-size:clamp(25px,3.4vw,36px);display:flex;align-items:center;gap:14px}
.lesson-head p{opacity:.94;max-width:640px;margin-top:4px}
.lesson-head .big-ico{
  position:absolute;right:26px;bottom:-16px;font-size:110px;opacity:.2;transform:rotate(-8deg);
}
.unit-progress{margin:14px 0 4px;max-width:420px}
.unit-progress .track{height:12px;background:rgba(255,255,255,.25);border-radius:8px;overflow:hidden}
.unit-progress .fill{height:100%;background:#fff;border-radius:8px;transition:width .5s ease}
.unit-progress .lbl{font-size:12.5px;font-weight:800;opacity:.9;margin-top:5px;letter-spacing:.4px}

.card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:26px 28px;margin-bottom:22px;border:1px solid var(--line);
}
.card h3{
  font-size:21.5px;margin-bottom:12px;display:flex;align-items:center;gap:10px;
}
.card h3 .n{
  width:30px;height:30px;border-radius:10px;background:var(--primary-soft);color:var(--primary);
  display:grid;place-items:center;font-size:15px;flex:none;
}
.card h4{font-size:17px;margin:18px 0 8px;color:var(--ink)}
.card p{margin-bottom:12px;color:#3A4060}
.card p:last-child{margin-bottom:0}
.card ul,.card ol{margin:0 0 14px 22px;color:#3A4060}
.card li{margin-bottom:7px}
.card strong{color:var(--ink)}
.card em{color:var(--primary-dark);font-style:normal;font-weight:800}

.scenario{
  background:linear-gradient(0deg,var(--gold-soft),var(--gold-soft));
  border:1.5px solid #FFE1A0;border-radius:14px;padding:16px 18px;margin:14px 0;
  display:flex;gap:14px;
}
.scenario .emo{font-size:26px;flex:none;line-height:1.2}
.scenario .body p{margin-bottom:8px}
.scenario .body p:last-child{margin-bottom:0}
.scenario .tag{
  font-size:11px;font-weight:900;letter-spacing:1.4px;color:#B07800;text-transform:uppercase;
  display:block;margin-bottom:3px;
}
.callout{
  border-radius:14px;padding:14px 18px;margin:14px 0;display:flex;gap:12px;font-size:15.5px;
}
.callout .emo{font-size:20px;flex:none}
.callout.tip{background:var(--green-soft);border:1.5px solid #B9EBD3}
.callout.warn{background:var(--red-soft);border:1.5px solid #F8C8C8}
.callout.info{background:var(--primary-soft);border:1.5px solid #D6D8FA}

/* chips */
.chip{
  display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono';font-size:12.5px;
  font-weight:600;padding:3px 11px;border-radius:20px;margin:0 2px;
}
.chip.g{background:var(--green-soft);color:#158552}
.chip.y{background:var(--gold-soft);color:#B07800}
.chip.r{background:var(--red-soft);color:#D63C3C}
.chip.b{background:var(--primary-soft);color:var(--primary-dark)}

/* ---------- Visual diagrams ---------- */
.viz{
  display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;
  background:#FAFBFF;border:1.5px dashed #D6D8FA;border-radius:14px;
  padding:22px 16px;margin:16px 0;
}
.cell{
  min-width:52px;height:52px;background:#fff;border:2.5px solid var(--primary);
  border-radius:10px;display:grid;place-items:center;
  font-family:'JetBrains Mono';font-weight:600;font-size:15px;position:relative;
}
.cell .idx{
  position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);
  font-size:11.5px;color:var(--muted);font-family:'Nunito';font-weight:800;
}
.cell.hi{background:var(--green-soft);border-color:var(--green)}
.cell.lo{background:var(--red-soft);border-color:var(--red)}
.viz .arrow{color:var(--muted);font-size:20px;font-weight:800}
.viz.spaced{padding-bottom:40px}
.nodebox{
  display:flex;align-items:stretch;border-radius:10px;overflow:hidden;
  border:2.5px solid var(--teal);background:#fff;font-family:'JetBrains Mono';font-size:14px;
}
.nodebox .val{padding:11px 15px;font-weight:600}
.nodebox .ptr{padding:11px 12px;background:#E2F7FA;border-left:2px dashed var(--teal);color:#0B7986;display:grid;place-items:center}
.stackviz{display:flex;flex-direction:column-reverse;gap:6px;align-items:center}
.stackviz .plate{
  width:150px;padding:9px 0;text-align:center;background:#fff;border:2.5px solid var(--purple);
  border-radius:10px;font-family:'JetBrains Mono';font-size:14px;font-weight:600;
}
.stackviz .plate.top{background:#F1EAFE;position:relative}
.stackviz .plate.top::after{
  content:"← top";position:absolute;right:-62px;top:8px;color:var(--purple);
  font-family:'Nunito';font-weight:800;font-size:13px;
}
.treeviz{text-align:center;font-family:'JetBrains Mono';line-height:2}
.tnode{
  display:inline-grid;place-items:center;width:46px;height:46px;border-radius:50%;
  background:#fff;border:2.5px solid var(--orange);font-weight:600;font-size:14.5px;margin:0 10px;
}
.tnode.root{background:#FFF0E6}

/* ---------- Code blocks ---------- */
.code-block{
  border-radius:14px;overflow:hidden;margin:16px 0;
  border:1px solid #2A2F4E;box-shadow:var(--shadow);
}
.code-head{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--navy-2);padding:9px 14px 9px 18px;
}
.code-head .fname{
  color:#9BA3D0;font-family:'JetBrains Mono';font-size:12.5px;display:flex;align-items:center;gap:9px;
}
.code-head .dots{display:flex;gap:5px}
.code-head .dots i{width:10px;height:10px;border-radius:50%;display:block}
.copy-btn{
  display:flex;align-items:center;gap:6px;color:#C9CDE8;font-size:12.5px;font-weight:800;
  background:rgba(255,255,255,.08);padding:6px 13px;border-radius:9px;
  transition:background .15s,color .15s;
}
.copy-btn:hover{background:rgba(255,255,255,.18);color:#fff}
.copy-btn.copied{background:var(--green);color:#fff}
.code-block pre{
  background:var(--navy);padding:18px 20px;overflow-x:auto;
  font-family:'JetBrains Mono';font-size:13.8px;line-height:1.7;color:#E4E7F7;
}
.code-block code{font-family:inherit}
.tok-k{color:#C792EA}   /* keyword */
.tok-s{color:#C3E88D}   /* string */
.tok-n{color:#F78C6C}   /* number */
.tok-c{color:#697098;font-style:italic} /* comment */
.tok-f{color:#82AAFF}   /* function */
.tok-o{color:#89DDFF}   /* output marker */

/* ---------- Tables ---------- */
.tbl{width:100%;border-collapse:collapse;margin:14px 0;font-size:15px}
.tbl th{
  background:var(--primary-soft);color:var(--primary-dark);text-align:left;
  padding:10px 14px;font-weight:800;font-size:13.5px;letter-spacing:.4px;
}
.tbl th:first-child{border-radius:10px 0 0 10px}
.tbl th:last-child{border-radius:0 10px 10px 0}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--line);color:#3A4060}
.tbl tr:last-child td{border-bottom:none}
.tbl code{
  font-family:'JetBrains Mono';font-size:12.5px;background:var(--bg);
  padding:2px 7px;border-radius:6px;color:var(--primary-dark);
}
p code,li code{
  font-family:'JetBrains Mono';font-size:13px;background:var(--primary-soft);
  padding:1.5px 7px;border-radius:6px;color:var(--primary-dark);
}

/* ---------- Quiz ---------- */
.quiz-q{margin-bottom:24px}
.quiz-q .qt{font-weight:800;font-size:16.5px;margin-bottom:12px;display:flex;gap:10px}
.quiz-q .qnum{
  flex:none;width:26px;height:26px;border-radius:9px;background:var(--primary);color:#fff;
  display:grid;place-items:center;font-size:13px;font-weight:900;margin-top:1px;
}
.quiz-opts{display:grid;gap:9px}
.quiz-opt{
  text-align:left;padding:12px 16px;border-radius:13px;background:var(--card);
  border:2px solid var(--line);font-weight:700;font-size:15px;color:var(--ink);
  transition:border-color .12s,background .12s,transform .1s;
  box-shadow:0 3px 0 var(--line);
}
.quiz-opt:hover:not(:disabled){border-color:var(--primary);transform:translateY(-1px)}
.quiz-opt:disabled{cursor:default}
.quiz-opt.correct{border-color:var(--green);background:var(--green-soft);box-shadow:0 3px 0 #B9EBD3}
.quiz-opt.wrong{border-color:var(--red);background:var(--red-soft);box-shadow:0 3px 0 #F8C8C8}
.quiz-why{
  margin-top:10px;font-size:14.5px;border-radius:12px;padding:12px 15px;display:none;
}
.quiz-why.show{display:block}
.quiz-why.ok{background:var(--green-soft);border:1.5px solid #B9EBD3}
.quiz-why.no{background:var(--red-soft);border:1.5px solid #F8C8C8}

.takeaways{display:grid;gap:10px;margin-top:6px}
.takeaways .tk{
  display:flex;gap:12px;background:#FAFBFF;border:1.5px solid var(--line);
  border-radius:13px;padding:12px 16px;font-size:15.5px;color:#3A4060;
}
.takeaways .tk b{color:var(--ink)}
.takeaways .tk .emo{flex:none}

.lesson-nav{display:flex;justify-content:space-between;gap:14px;margin-top:30px}
.big-btn{
  font-family:'Baloo 2';font-size:16.5px;font-weight:700;padding:13px 26px;border-radius:15px;
  transition:transform .1s,box-shadow .1s;display:inline-flex;align-items:center;gap:8px;
}
.big-btn.primary{background:var(--primary);color:#fff;box-shadow:0 5px 0 var(--primary-dark)}
.big-btn.primary:active{transform:translateY(4px);box-shadow:0 1px 0 var(--primary-dark)}
.big-btn.ghost{background:var(--card);color:var(--muted);border:2px solid var(--line);box-shadow:0 4px 0 var(--line)}
.big-btn.ghost:active{transform:translateY(3px);box-shadow:0 1px 0 var(--line)}
.big-btn.gold{background:var(--gold);color:#6b4d00;box-shadow:0 5px 0 #D89A0C}
.big-btn.gold:active{transform:translateY(4px);box-shadow:0 1px 0 #D89A0C}

/* toast + confetti */
.toast{
  position:fixed;bottom:26px;left:50%;transform:translate(-50%,120px);
  background:var(--navy);color:#fff;font-weight:800;padding:13px 24px;border-radius:15px;
  box-shadow:var(--shadow-lift);z-index:100;transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  display:flex;gap:10px;align-items:center;font-size:15px;
}
.toast.show{transform:translate(-50%,0)}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:99}

/* about / cheat sheet view */
.cheat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.cheat-grid .card{margin-bottom:0}

@media (max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{
    position:fixed;bottom:0;top:auto;height:auto;width:100%;z-index:60;
    flex-direction:row;align-items:center;padding:10px 14px;gap:8px;
  }
  .logo,.side-stats,.side-note{display:none}
  .nav-btn{justify-content:center;padding:10px}
  .nav-btn .lbl{display:none}
  .main{padding-bottom:120px}
  .path-node:nth-child(4n+1){transform:translateX(-52px)}
  .path-node:nth-child(4n+3){transform:translateX(52px)}
  .topbar{flex-wrap:wrap}
  .stackviz .plate.top::after{display:none}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-badge">🧠</div>
      <h1>DSA<span>Quest</span></h1>
    </div>
    <button class="nav-btn active" data-view="home" onclick="showHome()"><span class="ico">🗺️</span><span class="lbl">Learn Path</span></button>
    <button class="nav-btn" data-view="cheat" onclick="showCheat()"><span class="ico">⚡</span><span class="lbl">Big-O Cheat Sheet</span></button>
    <button class="nav-btn" data-view="about" onclick="showAbout()"><span class="ico">🎯</span><span class="lbl">How to Use</span></button>
    <div class="side-stats">
      <div class="row"><span>⭐ Total XP</span><span class="val" id="sideXP">0</span></div>
      <div class="row"><span>✅ Units done</span><span class="val" id="sideDone">0 / 0</span></div>
      <div class="row"><span>🎓 Level</span><span class="val" id="sideLevel">Newbie</span></div>
    </div>
  </aside>

/* ---- tiny helpers for building content ---- */
function code(fname, src){
  return `<div class="code-block">
    <div class="code-head">
      <span class="fname"><span class="dots"><i style="background:#F25C5C"></i><i style="background:#FFB100"></i><i style="background:#22B573"></i></span> ${fname}</span>
      <button class="copy-btn" onclick="copyCode(this)">📋 Copy</button>
    </div>
    <pre><code>${src}</code></pre>
  </div>`;
}
/* very small Python highlighter (safe: operates on pre-escaped source) */
function py(src){
  const kw=/\b(def|return|if|elif|else|for|while|in|not|and|or|class|import|from|None|True|False|break|continue|pass|lambda|is|yield|raise|try|except|with|as|global|del)\b/;
  const fn=/\b(print|len|range|enumerate|sorted|sum|min|max|abs|input|append|pop|push|list|dict|set|str|int|float|zip|map|reversed|heappush|heappop|heapify|popleft|appendleft|deque|Counter|defaultdict|join|split|get|add|remove|insert)\b/;
  const rx=new RegExp('(#[^\\n]*)|("[^"\\n]*"|\'[^\'\\n]*\')|'+kw.source+'|'+fn.source+'|\\b(\\d+\\.?\\d*)\\b','g');
  return src.replace(rx,(m,c,s,k,f,n)=>{
    if(c)return '<span class="tok-c">'+c+'</span>';
    if(s)return '<span class="tok-s">'+s+'</span>';
    if(k)return '<span class="tok-k">'+k+'</span>';
    if(f)return '<span class="tok-f">'+f+'</span>';
    return '<span class="tok-n">'+n+'</span>';
  });
}
function pyBlock(fname, src){ return code(fname, py(src)); }

{

title:'Big-O Notation', sub:'How fast is your code, really?',
tagline:'Before we learn any data structure, we need a language to compare them. Big-O is that language — it tells us how an algorithm behaves as the input grows huge.',
sections:`
<div class="card"><h3><span class="n">1</span>Why should you care?</h3>
${scenario('🍕','Real-life scenario: the pizza party',`
<p>You are ordering pizza for a party. Calling <strong>one friend</strong> to ask "veg or non-veg?" takes 1 minute. Calling <strong>100 friends</strong> takes 100 minutes — the effort <em>grows with the number of friends</em>. That's <code>O(n)</code>.</p>
<p>But if you post <strong>one message</strong> in the group chat, it takes 1 minute no matter how many friends are in the group. That's <code>O(1)</code> — constant time. Same goal, wildly different scaling!</p>`)}
<p>Big-O answers one question: <strong>"If my input gets 10× bigger, how much slower does my code get?"</strong> It ignores small details (your laptop speed, minor constants) and focuses on the <em>growth rate</em>.</p>
${info('Big-O describes the <strong>worst case</strong> by default. We plan for the busiest day, not the luckiest one.')}
</div>

<div class="card"><h3><span class="n">2</span>The Big-O family (meet the characters)</h3>
<table class="tbl">
<tr><th>Notation</th><th>Name</th><th>Feels like…</th><th>Example</th></tr>
<tr><td><span class="chip g">O(1)</span></td><td>Constant</td><td>⚡ Teleporting</td><td>Accessing <code>arr[5]</code>, dict lookup</td></tr>
<tr><td><span class="chip g">O(log n)</span></td><td>Logarithmic</td><td>🪓 Halving repeatedly</td><td>Binary search</td></tr>
<tr><td><span class="chip y">O(n)</span></td><td>Linear</td><td>🚶 Checking every item once</td><td>A single <code>for</code> loop</td></tr>
<tr><td><span class="chip y">O(n log n)</span></td><td>Linearithmic</td><td>🧹 Smart sorting</td><td>Merge sort, Python's <code>sorted()</code></td></tr>
<tr><td><span class="chip r">O(n²)</span></td><td>Quadratic</td><td>🐌 Everyone shakes hands with everyone</td><td>Nested loops</td></tr>
<tr><td><span class="chip r">O(2ⁿ)</span></td><td>Exponential</td><td>💥 Doubling explosion</td><td>Naive Fibonacci recursion</td></tr>
</table>
${scenario('📖','Scenario: finding a word in a dictionary',`
<p><strong>O(n) way:</strong> read every single page from page 1 until you find "zebra". For a 1000-page dictionary → up to 1000 steps.</p>
<p><strong>O(log n) way:</strong> open the middle. "Zebra" comes after "M"? Throw away the left half. Repeat. 1000 pages → only ~10 steps. Halving is a superpower.</p>`)}
</div>

<div class="card"><h3><span class="n">3</span>See it in code</h3>
<h4>O(1) — constant time</h4>
${pyBlock('constant_time.py',`def get_first_student(students):
    # No matter if the list has 5 or 5 million students,
    # grabbing index 0 is ONE step. Always.
    return students[0]

students = ["Aisha", "Ravi", "Meera", "John"]
print(get_first_student(students))   # Output: Aisha`)}
<h4>O(n) — linear time</h4>
${pyBlock('linear_time.py',`def find_student(students, target):
    # Worst case: the target is the LAST name (or missing),
    # so we touch all n items -> O(n)
    for i, name in enumerate(students):
        if name == target:
            return f"Found {target} at position {i}"
    return f"{target} is not in the class"

students = ["Aisha", "Ravi", "Meera", "John"]
print(find_student(students, "John"))   # Output: Found John at position 3`)}
<h4>O(n²) — quadratic time (the handshake problem)</h4>
${pyBlock('quadratic_time.py',`def find_duplicate_pairs(names):
    # Every name is compared with every OTHER name.
    # 10 names -> ~100 comparisons. 1000 names -> ~1,000,000!
    pairs = []
    for i in range(len(names)):
        for j in range(i + 1, len(names)):
            if names[i] == names[j]:
                pairs.append((i, j))
    return pairs

print(find_duplicate_pairs(["amy", "bob", "amy", "cat"]))
# Output: [(0, 2)]  -> "amy" appears at index 0 and 2`)}
${tip('A loop <strong>inside</strong> a loop over the same data usually means O(n²). Whenever you spot it, ask: "Can a dictionary or a sort help me avoid the inner loop?" (Spoiler: very often, yes — you\'ll see this in the Hashing unit!)')}

<div class="card"><h3><span class="n">4</span>Quick rules for calculating Big-O</h3>
<ol>
<li><strong>Drop constants:</strong> <code>O(2n)</code> → <code>O(n)</code>. Doing two passes over the data is still "linear-ish".</li>
<li><strong>Keep the biggest term:</strong> <code>O(n² + n + 5)</code> → <code>O(n²)</code>. When n = 1 million, the n² part dwarfs everything.</li>
<li><strong>Sequential steps add</strong>, <strong>nested steps multiply:</strong> a loop then another loop = <code>O(n + n) = O(n)</code>. A loop inside a loop = <code>O(n × n) = O(n²)</code>.</li>
<li><strong>Different inputs → different letters:</strong> looping over list A then list B is <code>O(a + b)</code>, not <code>O(n)</code>.</li>
</ol>
${warn('Big-O also applies to <strong>memory</strong> (space complexity). Creating a copy of a list costs O(n) space. Sometimes you trade space for speed — that\'s the classic move behind hashing and dynamic programming.')}
</div>`,

<tr><th>Operation</th><th>Array / list</th><th>Linked list</th></tr>
<tr><td>Access by index</td><td><span class="chip g">O(1)</span></td><td><span class="chip y">O(n)</span> — walk the chain</td></tr>
<tr><td>Insert/delete at front</td><td><span class="chip r">O(n)</span> — shift everyone</td><td><span class="chip g">O(1)</span> — re-point one arrow</td></tr>
<tr><td>Insert after a known node</td><td><span class="chip r">O(n)</span></td><td><span class="chip g">O(1)</span></td></tr>
<tr><td>Search by value</td><td><span class="chip y">O(n)</span></td><td><span class="chip y">O(n)</span></td></tr>
</table>
${info('This is the eternal trade-off: <strong>arrays are for reading, linked lists are for rearranging.</strong> Music playlists, browser history and undo systems love linked structures because items get inserted and removed constantly.')}
</div>

<div class="card"><h3><span class="n">2</span>Build one from scratch</h3>
${pyBlock('linked_list.py',`class Node:
    def __init__(self, data):
        self.data = data      # the clue's message
        self.next = None      # where the next clue is (empty for now)

class LinkedList:
    def __init__(self):
        self.head = None      # the very first clue

    def append(self, data):
        """Add a node at the end - walk to the last node, attach."""
        new_node = Node(data)
        if self.head is None:         # empty hunt? new node IS the start
            self.head = new_node
            return
        current = self.head
        while current.next:           # walk until the last node
            current = current.next
        current.next = new_node       # attach the new clue

    def prepend(self, data):
        """Add at the FRONT — the O(1) superpower."""
        new_node = Node(data)
        new_node.next = self.head     # new node points to old first
        self.head = new_node          # head now points to new node

    def display(self):
        items, current = [], self.head
        while current:
            items.append(str(current.data))
            current = current.next
        print(" -> ".join(items) + " -> None")

hunt = LinkedList()
hunt.append(10)
hunt.append(20)
hunt.append(30)
hunt.prepend(5)
hunt.display()        # 5 -> 10 -> 20 -> 30 -> None`)}
</div>

<div class="card"><h3><span class="n">3</span>Deleting a node</h3>
${scenario('⛓️','Scenario: removing one link from a chain',`<p>To remove the middle link of a chain, you don't touch the link itself — you make the <strong>previous link grab the next one</strong>, and the middle link simply falls away. Deleting from a linked list is exactly this: <code>prev.next = current.next</code>.</p>`)}
${pyBlock('delete_node.py',`def delete_value(self, target):
    if self.head is None:
        return
    # Case 1: deleting the very first node
    if self.head.data == target:
        self.head = self.head.next
        return
    # Case 2: find the node BEFORE the target
    current = self.head
    while current.next and current.next.data != target:
        current = current.next
    if current.next:                      # found it!
        current.next = current.next.next  # skip over the target

# Attach to the class, then:
LinkedList.delete_value = delete_value
hunt.delete_value(20)
hunt.display()        # 5 -> 10 -> 30 -> None`)}
</div>

<div class="card"><h3><span class="n">4</span>The interview classic: reverse a linked list</h3>
<p>Imagine walking the chain and <strong>flipping every arrow to point backwards</strong>. You need three fingers: one on the previous node, one on the current, one saving the next (so you don't lose the rest of the chain).</p>
${pyBlock('reverse_linked_list.py',`def reverse(self):
    prev = None
    current = self.head
    while current:
        nxt = current.next     # 1) save the rest of the chain
        current.next = prev    # 2) flip this arrow backwards
        prev = current         # 3) step prev forward
        current = nxt          # 4) step current forward
    self.head = prev           # prev ends on the old last node

LinkedList.reverse = reverse
hunt.reverse()
hunt.display()        # 30 -> 10 -> 5 -> None`)}
${tip('Say the mantra out loud: <strong>save → flip → step → step</strong>. Once it clicks, this O(n)-time / O(1)-space reversal never leaves you.')}
${warn('The #1 bug: flipping <code>current.next</code> before saving it. You instantly lose the rest of the list — like burning the treasure map while holding clue #2.')}
</div>`,
quiz:[
{q:'Why is inserting at the FRONT of a linked list O(1)?',opts:['Nodes are stored side by side','You only re-point head and the new node — nobody shifts','Python optimizes it','It is actually O(n)'],a:1,why:'Two pointer updates, done. Compare with an array where all n items must physically shift right.'},
{q:'To read the 500th element of a linked list you must…',opts:['Jump directly to it in O(1)','Walk node-by-node from the head — O(n)','Sort it first','Use binary search'],a:1,why:'No indexes exist — only the chain of next pointers. Random access is the linked list\'s weakness.'},
{q:'In the reversal loop, why do we save nxt = current.next FIRST?',opts:['For readability','Because flipping current.next would otherwise disconnect us from the rest of the list','Python requires it','To save memory'],a:1,why:'current.next is our only bridge to the unvisited part. Flip before saving and the remainder of the list is unreachable.'}
]},

{
id:'stacks', icon:'🥞', c1:'#8B5CF6', c2:'#5A5FE0',
title:'Stacks', sub:'Last In, First Out (LIFO)',
tagline:'A stack lets you add and remove from one end only — the top. The last thing you put in is the first thing you take out. Simple rule, enormous power.',
sections:`
<div class="card"><h3><span class="n">1</span>The mental model</h3>
${scenario('🍽️','Real-life scenario: the plate stack',`
<p>In a canteen, clean plates are stacked in a pile. You always <strong>take the top plate</strong>, and washed plates go <strong>back on top</strong>. Nobody digs out the bottom plate — that would collapse the pile!</p>
<p>More examples you use daily: the <strong>Undo</strong> button (last edit undone first), the <strong>Back</strong> button in your browser, and the "call stack" that runs every function in Python.</p>`)}
<div class="viz"><div class="stackviz">
  <div class="plate">"google.com"</div>
  <div class="plate">"maps page"</div>
  <div class="plate top">"restaurant page"</div>
</div></div>
<p style="text-align:center;color:var(--muted);font-size:14px">Your browser history is a stack — pressing Back <strong>pops</strong> the top page.</p>
<table class="tbl">
<tr><th>Operation</th><th>Meaning</th><th>Python (using a list)</th><th>Cost</th></tr>
<tr><td><strong>push</strong></td><td>Add on top</td><td><code>stack.append(x)</code></td><td><span class="chip g">O(1)</span></td></tr>
<tr><td><strong>pop</strong></td><td>Remove the top</td><td><code>stack.pop()</code></td><td><span class="chip g">O(1)</span></td></tr>
<tr><td><strong>peek</strong></td><td>Look at the top</td><td><code>stack[-1]</code></td><td><span class="chip g">O(1)</span></td></tr>
<tr><td><strong>is empty?</strong></td><td>Anything left?</td><td><code>not stack</code></td><td><span class="chip g">O(1)</span></td></tr>
</table>
${info('In Python you don\'t need a special class — a plain <code>list</code> used only with <code>append()</code> and <code>pop()</code> IS a perfectly good stack.')}
</div>

<div class="card"><h3><span class="n">2</span>Stack in action: Undo feature</h3>
${pyBlock('undo_feature.py',`history = []                 # our stack

def type_text(text):
    history.append(text)     # push every action
    print(f"Typed: {text}")

def undo():
    if not history:          # ALWAYS check before popping!
        print("Nothing to undo")
        return
    last = history.pop()     # pop the most recent action
    print(f"Undid: {last}")

type_text("Hello")
type_text("World")
undo()                       # Undid: World   <- last in, first out!
undo()                       # Undid: Hello
undo()                       # Nothing to undo`)}
</div>

<div class="card"><h3><span class="n">3</span>The classic: balanced brackets</h3>
${scenario('🧑‍💻','Scenario: your code editor',`<p>How does VS Code instantly know that <code>{ [ ( ) ] }</code> is fine but <code>( [ ) ]</code> is broken? A stack! Every opening bracket is pushed; every closing bracket must match the <strong>most recent</strong> unclosed opener — which is exactly the top of the stack.</p>`)}
${pyBlock('balanced_brackets.py',`def is_balanced(text):
    stack = []
    pairs = {")": "(", "]": "[", "}": "{"}

    for ch in text:
        if ch in "([{":
            stack.append(ch)              # opener -> push
        elif ch in ")]}":
            if not stack:                 # closer with nothing open?
                return False
            if stack.pop() != pairs[ch]:  # wrong opener on top?
                return False
    return len(stack) == 0                # leftovers = unclosed

print(is_balanced("{[()]}"))      # True
print(is_balanced("([)]"))        # False  -> crossed pairs
print(is_balanced("((("))         # False  -> never closed`)}
${tip('Interview pattern: whenever a problem says <em>"most recent unfinished thing must be handled first"</em> — matching, undo, backtracking, parsing — your brain should shout <strong>STACK</strong>.')}
</div>

<div class="card"><h3><span class="n">4</span>Bonus: reverse anything with a stack</h3>
${pyBlock('reverse_with_stack.py',`def reverse_word(word):
    stack = list(word)       # push all letters
    result = []
    while stack:
        result.append(stack.pop())   # pop returns them backwards
    return "".join(result)

print(reverse_word("python"))   # nohtyp`)}
${warn('Popping an empty stack raises <code>IndexError</code>. Guard with <code>if stack:</code> — in interviews, forgetting this check is the most common stack bug.')}
</div>`,
quiz:[
{q:'You push 1, push 2, push 3, then pop twice. What remains on the stack?',opts:['[2, 3]','[1]','[3]','[1, 2]'],a:1,why:'LIFO: the pops remove 3 then 2 (the most recent items). Only 1 survives at the bottom.'},
{q:'Which real-world feature is the most natural fit for a stack?',opts:['A printer processing jobs in arrival order','The Undo button in an editor','A ticket queue at a counter','A phone contact list'],a:1,why:'Undo reverses the MOST RECENT action first — pure LIFO. Printers and ticket counters are FIFO (queues!).'},
{q:'In the balanced-brackets algorithm, what does a non-empty stack at the very end mean?',opts:['The text was balanced','Some brackets were opened but never closed','A closing bracket appeared first','The text was empty'],a:1,why:'Leftover openers had no matching closers — like "(((" — so the text is unbalanced.'}
]},

${scenario('☕','Real-life scenario: the coffee shop line',`
<p>Ten people are lined up at a café. New customers join at the <strong>back (enqueue)</strong>; the barista serves from the <strong>front (dequeue)</strong>. Jumping the line is not allowed — that fairness is the whole point of FIFO.</p>
<p>Software queues are everywhere: <strong>printer jobs</strong>, <strong>customer-support tickets</strong>, <strong>YouTube's upload processing</strong>, keyboard input buffers, and message queues between servers (Kafka, RabbitMQ, SQS — all giant queues!).</p>`)}

${warn('Using a plain list as a queue means <code>list.pop(0)</code> — an <span class="chip r">O(n)</span> shift of every element, every single time. For real queues, Python gives us <code>collections.deque</code> with O(1) at BOTH ends.')}

<div class="card"><h3><span class="n">2</span>deque — the proper tool</h3>
${pyBlock('queue_basics.py',`from collections import deque

line = deque()

# enqueue: join at the back
line.append("Aisha")
line.append("Ravi")
line.append("Meera")

# dequeue: serve from the front — O(1)!
served = line.popleft()
print(f"Now serving: {served}")   # Now serving: Aisha
print(line)                        # deque(['Ravi', 'Meera'])

# peek at who's next, without removing
print(f"Next up: {line[0]}")      # Next up: Ravi`)}
<table class="tbl">
<tr><th>Queue operation</th><th>deque method</th><th>Cost</th></tr>
<tr><td>Enqueue (join back)</td><td><code>q.append(x)</code></td><td><span class="chip g">O(1)</span></td></tr>
<tr><td>Dequeue (serve front)</td><td><code>q.popleft()</code></td><td><span class="chip g">O(1)</span></td></tr>
<tr><td>Peek front</td><td><code>q[0]</code></td><td><span class="chip g">O(1)</span></td></tr>
<tr><td>Size / empty?</td><td><code>len(q)</code> / <code>not q</code></td><td><span class="chip g">O(1)</span></td></tr>
</table>
</div>

<div class="card"><h3><span class="n">3</span>Queue in action: the help desk simulator</h3>
${pyBlock('help_desk.py',`from collections import deque

tickets = deque()

def raise_ticket(name, issue):
    tickets.append((name, issue))
    print(f"🎫 Ticket from {name}: {issue}")

def resolve_next():
    if not tickets:
        print("✅ Queue empty — coffee break!")
        return
    name, issue = tickets.popleft()      # fairness: oldest first
    print(f"🔧 Resolving {name}'s issue: {issue}")

raise_ticket("Aisha", "WiFi down")
raise_ticket("Ravi", "Forgot password")
resolve_next()    # 🔧 Resolving Aisha's issue: WiFi down
resolve_next()    # 🔧 Resolving Ravi's issue: Forgot password
resolve_next()    # ✅ Queue empty — coffee break!`)}
</div>

<div class="card"><h3><span class="n">4</span>Variations you'll meet later</h3>
<ul>
<li><strong>Deque (double-ended queue):</strong> add/remove at <em>both</em> ends in O(1) — you just used it! Also powers "sliding window" problems.</li>
<li><strong>Circular queue:</strong> a fixed-size ring — when full, the oldest entry gets overwritten. Used for logs and streaming buffers.</li>
<li><strong>Priority queue:</strong> the "queue" at a hospital ER — most urgent first, not first-come. It's actually a <em>heap</em>, and it gets its own unit soon. 👀</li>
</ul>
${tip('Queues are the heart of <strong>Breadth-First Search (BFS)</strong> — the level-by-level exploration you\'ll use on trees and graphs. Master <code>append</code> / <code>popleft</code> now and BFS will feel effortless.')}
</div>`,

{q:'Why is collections.deque preferred over a plain list for queues?',opts:['It sorts items automatically','list.pop(0) is O(n) but deque.popleft() is O(1)','deque uses less syntax','Lists cannot remove from the front'],a:1,why:'Removing a list\'s first item shifts every remaining element. Deque is built for O(1) operations at both ends.'},
{q:'Which is the best real-world model of a PRIORITY queue?',opts:['A café line','A hospital emergency room','A stack of plates','Browser back button'],a:1,why:'ER patients are treated by urgency, not arrival time — priority beats position. Regular queues are pure FIFO.'}
]},

{
id:'hashing', icon:'🗂️', c1:'#FFB100', c2:'#F97B3D',
title:'Hashing: dicts & sets', sub:'The O(1) lookup superpower',
tagline:'Hash tables — Python dicts and sets — are the single most useful tool in practical programming. They turn "search through everything" into "jump straight to it".',
sections:`
<div class="card"><h3><span class="n">1</span>The mental model</h3>
${scenario('🏋️','Real-life scenario: the gym locker room',`
<p>You arrive at the gym and the receptionist runs your name through a little formula: <em>"PRIYA → locker 47."</em> Next visit, the same formula sends you straight to locker 47. <strong>No searching, ever.</strong></p>
<p>That formula is the <strong>hash function</strong>: it converts a key into a storage position. Python's <code>dict</code> and <code>set</code> do this invisibly, giving you <span class="chip g">O(1)</span> average-time insert, lookup, and delete.</p>`)}
<table class="tbl">
<tr><th>Operation</th><th>List</th><th>Dict / Set</th></tr>
<tr><td><code>x in collection</code></td><td><span class="chip y">O(n)</span></td><td><span class="chip g">O(1)</span></td></tr>
<tr><td>Insert</td><td><span class="chip g">O(1)</span> at end</td><td><span class="chip g">O(1)</span></td></tr>
<tr><td>Delete by key/value</td><td><span class="chip y">O(n)</span></td><td><span class="chip g">O(1)</span></td></tr>
<tr><td>Get value for a key</td><td>—</td><td><span class="chip g">O(1)</span></td></tr>
</table>
${info('The catch: dicts have <strong>no positions</strong>, keys must be <strong>immutable</strong> (strings, numbers, tuples — not lists), and occasionally two keys hash to the same slot (a <em>collision</em>) — Python quietly resolves those for you.')}
</div>

<div class="card"><h3><span class="n">2</span>Dict essentials</h3>
${pyBlock('dict_basics.py',`# key : value pairs — like a real dictionary: word -> meaning
marks = {"Aisha": 91, "Ravi": 78, "Meera": 85}

print(marks["Aisha"])          # 91
marks["John"] = 88             # insert
marks["Ravi"] = 80             # update

# Safe lookup: .get() never crashes on missing keys
print(marks.get("Zara"))       # None
print(marks.get("Zara", 0))    # 0  (custom default)

for name, score in marks.items():
    print(f"{name}: {score}")

# Aisha: 91
# Ravi: 80
# John: 88`)}
<h4>Set essentials — a dict with only keys</h4>
${pyBlock('set_basics.py',`visited = {"delhi", "mumbai", "goa"}

visited.add("jaipur")          # O(1)
visited.add("goa")             # duplicates are silently ignored!
print("goa" in visited)        # True — O(1) membership test

a = {1, 2, 3, 4}
b = {3, 4, 5}
print(a & b)   # {3, 4}     intersection: in BOTH
print(a | b)   # {1,2,3,4,5} union: in EITHER
print(a - b)   # {1, 2}     difference: in a but not b`)}
</div>

<div class="card"><h3><span class="n">3</span>The magic trick: killing the inner loop</h3>
${scenario('🎯','Scenario: Two Sum — the most famous interview question on Earth',`<p>Given prices <code>[2, 7, 11, 15]</code> and a gift-card budget of <code>9</code> — which two items exactly use the full budget? The naive answer checks <strong>every pair</strong>: O(n²). A dict remembers what we've already seen and answers "have you seen 9 − 2 = 7?" in O(1).</p>`)}
${pyBlock('two_sum.py',`def two_sum_slow(nums, target):          # ❌ O(n²)
    for i in range(len(nums)):
        for j in range(i + 1, len(nums)):
            if nums[i] + nums[j] == target:
                return [i, j]

def two_sum_fast(nums, target):          # ✅ O(n)
    seen = {}                            # value -> index
    for i, num in enumerate(nums):
        need = target - num              # the partner we're hoping for
        if need in seen:                 # O(1) lookup!
            return [seen[need], i]
        seen[num] = i                    # remember this number
    return None

print(two_sum_fast([2, 7, 11, 15], 9))   # [0, 1] -> 2 + 7 = 9`)}
<h4>Frequency counting — the everyday workhorse</h4>
${pyBlock('frequency.py',`votes = ["tea", "coffee", "tea", "juice", "tea", "coffee"]

tally = {}
for drink in votes:
    tally[drink] = tally.get(drink, 0) + 1
print(tally)   # {'tea': 3, 'coffee': 2, 'juice': 1}

# Or let Python do it — collections.Counter:
from collections import Counter
tally = Counter(votes)
print(tally.most_common(1))   # [('tea', 3)]  -> the winner!`)}
<h4>First duplicate — set as a memory</h4>
${pyBlock('first_duplicate.py',`def first_repeated(items):
    seen = set()
    for x in items:
        if x in seen:          # O(1) — have we met before?
            return x
        seen.add(x)
    return None

print(first_repeated([3, 1, 4, 1, 5]))   # 1`)}
${tip('The grand pattern of this unit: <strong>"trade a little memory for a lot of speed."</strong> Any time you catch yourself writing a nested loop that merely <em>searches</em>, ask if a dict or set can remember things for you.')}
</div>`,
quiz:[
{q:'Checking "x in my_set" on a set with 1 million items takes roughly…',opts:['1 million steps','~20 steps','1 step (constant, on average)','Depends on x\'s size'],a:2,why:'The hash function jumps straight to x\'s slot — O(1) average, regardless of collection size.'},
{q:'Which of these CANNOT be a dict key?',opts:['"hello"','42','(1, 2)','[1, 2]'],a:3,why:'Keys must be immutable (hashable). A list can change after insertion, which would break its hash — so Python forbids it. The tuple (1,2) is fine.'},
{q:'The fast Two Sum works because the dict lets us ask ___ in O(1).',opts:['"what is the largest number so far?"','"have we already seen the partner (target − current)?"','"is the list sorted?"','"how many pairs exist?"'],a:1,why:'Instead of re-scanning for the partner (inner loop), we ask the dict — turning O(n²) into O(n).'}
]},

/* ---------------- 8. RECURSION ---------------- */
{
id:'recursion', icon:'🪆', c1:'#8B5CF6', c2:'#F25C5C',
title:'Recursion', sub:'Functions that call themselves',
tagline:'Recursion is solving a big problem by solving a slightly smaller copy of the same problem — until the problem becomes so tiny the answer is obvious.',
sections:`
<div class="card"><h3><span class="n">1</span>The mental model</h3>
${scenario('🪆','Real-life scenario: Russian nesting dolls',`
<p>To count matryoshka dolls: open the doll, and if there's another inside, <strong>ask the same question about the smaller doll</strong>. Eventually you hit the tiny solid doll — that's your <strong>base case</strong> — then the answers stack back up: 1 + 1 + 1…</p>`)}
${scenario('🎬','Scenario 2: the cinema row question',`<p>"Which row am I in?" You ask the person in front, who asks the person in front… until <strong>row 1</strong> answers instantly (base case). Each person adds 1 to the reply coming back. That's recursion: <em>delegate a smaller question, then add your bit.</em></p>`)}
<p>Every correct recursive function has exactly two parts:</p>
<ul>
<li><strong>Base case</strong> — the tiny problem you can answer directly. <em>(No base case = infinite loop = 💥 RecursionError.)</em></li>
<li><strong>Recursive case</strong> — do a little work, then call yourself on a <strong>smaller</strong> input.</li>
</ul>
</div>

<div class="card"><h3><span class="n">2</span>First steps</h3>
${pyBlock('countdown.py',`def countdown(n):
    if n == 0:               # BASE CASE: stop!
        print("Lift off! 🚀")
        return
    print(n)
    countdown(n - 1)         # RECURSIVE CASE: smaller problem

countdown(3)
# 3
# 2
# 1
# Lift off! 🚀`)}
<h4>Factorial — the "hello world" of recursion</h4>
${pyBlock('factorial.py',`def factorial(n):
    """5! = 5 x 4 x 3 x 2 x 1 = 120
    Insight: 5! is just 5 x 4!  — a smaller copy of itself."""
    if n &lt;= 1:              # base case
        return 1
    return n * factorial(n - 1)

print(factorial(5))   # 120

# How Python unwinds it:
# factorial(5) = 5 * factorial(4)
#              = 5 * 4 * factorial(3)
#              = 5 * 4 * 3 * factorial(2)
#              = 5 * 4 * 3 * 2 * factorial(1)
#              = 5 * 4 * 3 * 2 * 1 = 120`)}
${info('Behind the scenes, every call is <strong>pushed onto the call stack</strong> (yes — the stack from Unit 5!) and popped when it returns. That\'s why runaway recursion gives a "stack overflow".')}
<h4>Sum of a list, recursively</h4>
${pyBlock('recursive_sum.py',`def total(nums):
    if not nums:                       # base case: empty list sums to 0
        return 0
    return nums[0] + total(nums[1:])   # first item + sum of the rest

print(total([4, 8, 15, 16, 23, 42]))   # 108`)}

<div class="card"><h3><span class="n">3</span>Fibonacci — and recursion's dark side</h3>

# fib(35) already takes seconds — fib(5) alone recomputes fib(2) three times!`)}

</div></div>

<div class="card"><h3><span class="n">2</span>The BST rule = built-in binary search</h3>

${pyBlock('bst.py',`class Node:
    def __init__(self, value):
        self.value = value
        self.left = None      # smaller values live here
        self.right = None     # bigger values live here

def insert(root, value):
    if root is None:                 # empty spot found — plant it!
        return Node(value)
    if value &lt; root.value:
        root.left = insert(root.left, value)
    else:
        root.right = insert(root.right, value)
    return root

def search(root, target):
    if root is None:
        return False                 # fell off the tree — not here
    if root.value == target:
        return True
    if target &lt; root.value:
        return search(root.left, target)    # discard right half
    return search(root.right, target)       # discard left half

root = None
for v in [8, 3, 10, 1, 6, 14]:
    root = insert(root, v)

print(search(root, 6))    # True
print(search(root, 7))    # False`)}
${info('Notice how naturally <strong>recursion</strong> (Unit 8) fits trees: "insert into a tree" becomes "insert into the correct sub-tree" — the same problem, smaller.')}

<tr><td><strong>In-order</strong></td><td>left → node → right</td><td>Visits a BST in <em>sorted order</em>! 🤯</td></tr>
<tr><td><strong>Pre-order</strong></td><td>node → left → right</td><td>Copying / serializing a tree</td></tr>
<tr><td><strong>Post-order</strong></td><td>left → right → node</td><td>Safely deleting (children first)</td></tr>
</table>

    in_order(node.right)         # 3. all bigger values

in_order(root)    # 1 3 6 8 10 14  <- sorted, for free!`)}

${pyBlock('level_order.py',`from collections import deque

def level_order(root):

</div>`,

<p>A <strong>min-heap</strong> is a binary tree where <em>every parent ≤ its children</em>. The minimum is therefore always the root. It makes just three promises:</p>

<h4>Storing a graph: the adjacency list</h4>
<p>For each node, simply keep a list of its neighbours — a dict of lists. Compact, fast, and the industry default.</p>
${pyBlock('adjacency_list.py',`# Who is friends with whom?
friends = {
    "aisha": ["ravi", "meera"],
    "ravi":  ["aisha", "john"],
    "meera": ["aisha", "john"],
    "john":  ["ravi", "meera", "zara"],

}

<div class="card"><h3><span class="n">2</span>BFS — explore in rings (uses a queue!)</h3>
${scenario('💧','Scenario: ripples in a pond',`<p>Drop a stone where you stand: the ripple reaches your <strong>direct friends first</strong>, then friends-of-friends, then their friends… BFS explores level by level, which is why it finds the <strong>shortest path</strong> (fewest hops) in unweighted graphs.</p>`)}
${pyBlock('bfs.py',`from collections import deque

def bfs(graph, start):
    visited = {start}          # a set (Unit 7!) so we never loop forever
    q = deque([start])         # a queue (Unit 6!)
    order = []

    while q:
        person = q.popleft()   # take the FRONT — closest ring first
        order.append(person)
        for friend in graph[person]:
            if friend not in visited:
                visited.add(friend)
                q.append(friend)
    return order

print(bfs(friends, "aisha"))
# ['aisha', 'ravi', 'meera', 'john', 'zara']  <- ring by ring!`)}
</div>

<div class="card"><h3><span class="n">3</span>DFS — explore one path to the end (uses a stack!)</h3>

${pyBlock('dfs.py',`def dfs(graph, start, visited=None, order=None):
    if visited is None:
        visited, order = set(), []
    visited.add(start)
    order.append(start)
    for friend in graph[start]:
        if friend not in visited:
            dfs(graph, friend, visited, order)   # dive deeper first!
    return order

print(dfs(friends, "aisha"))
# ['aisha', 'ravi', 'john', 'meera', 'zara']  <- deep dives`)}
${info('Recursive DFS uses the <strong>call stack</strong> implicitly. You can also write it iteratively with an explicit stack: identical to BFS but with <code>stack.pop()</code> instead of <code>q.popleft()</code>. One character of difference — two totally different explorations!')}

<tr><th></th><th>BFS 💧</th><th>DFS 🌽</th></tr>
<tr><td>Data structure</td><td>Queue</td><td>Stack / recursion</td></tr>
<tr><td>Explores</td><td>Ring by ring</td><td>Path by path</td></tr>
<tr><td>Best at</td><td>Shortest path (unweighted), "degrees of separation"</td><td>Maze solving, cycle detection, topological sort</td></tr>
</table>
<h4>Mini-project: degrees of separation</h4>
${pyBlock('shortest_hops.py',`from collections import deque

def degrees(graph, start, target):
    q = deque([(start, 0)])          # (person, hops from start)
    visited = {start}
    while q:
        person, hops = q.popleft()
        if person == target:
            return hops
        for friend in graph[person]:
            if friend not in visited:
                visited.add(friend)
                q.append((friend, hops + 1))
    return -1                        # unreachable

print(degrees(friends, "aisha", "zara"))   # 3  (aisha->ravi->john->zara)`)}

{
id:'sorting', icon:'🃏', c1:'#F97B3D', c2:'#F25C5C',

tagline:'Sorting is the most-studied problem in computer science — and the friendliest way to compare algorithm designs. Watch the same task solved four increasingly clever ways.',
sections:`

${pyBlock('bubble_sort.py',`def bubble_sort(arr):
    n = len(arr)
    for i in range(n):
        swapped = False
        for j in range(n - 1 - i):        # the last i items are already set
            if arr[j] > arr[j + 1]:       # neighbours out of order?
                arr[j], arr[j + 1] = arr[j + 1], arr[j]
                swapped = True
        if not swapped:                   # a clean pass = already sorted!
            break
    return arr

print(bubble_sort([5, 1, 4, 2, 8]))   # [1, 2, 4, 5, 8]`)}
</div>

<div class="card"><h3><span class="n">2</span>Selection & insertion — two human strategies</h3>
${scenario('🃏','Scenario: sorting cards in your hand',`
<p><strong>Selection sort</strong> mimics: "scan ALL cards, pull out the smallest, place it first; repeat with the rest." Always O(n²), but makes the fewest swaps.</p>
<p><strong>Insertion sort</strong> mimics how most people actually play cards: take the next card and <strong>slide it left into its correct spot</strong> among the already-sorted cards. O(n²) worst case, but nearly <span class="chip g">O(n)</span> on almost-sorted data — so it's genuinely used for small/nearly-sorted inputs!</p>`)}
${pyBlock('insertion_sort.py',`def insertion_sort(arr):
    for i in range(1, len(arr)):
        card = arr[i]                 # the new card in your hand
        j = i - 1
        while j >= 0 and arr[j] > card:
            arr[j + 1] = arr[j]       # shift bigger cards right
            j -= 1
        arr[j + 1] = card             # slot the card into place
    return arr

print(insertion_sort([7, 3, 9, 1]))   # [1, 3, 7, 9]`)}
</div>

<div class="card"><h3><span class="n">3</span>Merge sort — divide and conquer</h3>
${scenario('📚','Scenario: two librarians',`<p>Sorting 1000 books alone is hard. So: <strong>split the pile in half</strong>, hand each half to a librarian (who splits again, and again…). Single books are trivially "sorted". Then repeatedly <strong>merge</strong> two sorted piles by always taking the smaller front book — a zipper motion. Result: guaranteed <span class="chip y">O(n log n)</span>.</p>`)}
${pyBlock('merge_sort.py',`def merge_sort(arr):
    if len(arr) &lt;= 1:                 # base case: 0/1 items = sorted
        return arr
    mid = len(arr) // 2
    left = merge_sort(arr[:mid])      # recursion (Unit 8!)
    right = merge_sort(arr[mid:])
    return merge(left, right)

def merge(left, right):
    """Zip two SORTED lists into one sorted list — O(n)."""
    result, i, j = [], 0, 0
    while i &lt; len(left) and j &lt; len(right):
        if left[i] &lt;= right[j]:
            result.append(left[i]); i += 1
        else:
            result.append(right[j]); j += 1
    result.extend(left[i:])           # leftovers (one side is empty)
    result.extend(right[j:])
    return result

print(merge_sort([38, 27, 43, 3, 9, 82, 10]))
# [3, 9, 10, 27, 38, 43, 82]`)}
<table class="tbl">
<tr><th>Algorithm</th><th>Best</th><th>Worst</th><th>Extra space</th><th>Claim to fame</th></tr>
<tr><td>Bubble</td><td><span class="chip g">O(n)</span></td><td><span class="chip r">O(n²)</span></td><td>O(1)</td><td>Simplest to learn</td></tr>
<tr><td>Selection</td><td><span class="chip r">O(n²)</span></td><td><span class="chip r">O(n²)</span></td><td>O(1)</td><td>Minimum swaps</td></tr>
<tr><td>Insertion</td><td><span class="chip g">O(n)</span></td><td><span class="chip r">O(n²)</span></td><td>O(1)</td><td>Great on nearly-sorted data</td></tr>
<tr><td>Merge</td><td><span class="chip y">O(n log n)</span></td><td><span class="chip y">O(n log n)</span></td><td>O(n)</td><td>Guaranteed fast & stable</td></tr>
</table>
</div>

print(sorted(nums, reverse=True)) # [9, 5, 2, 1]

# The 'key' parameter: sort by ANYTHING

by_score = sorted(students, key=lambda s: s[1], reverse=True)
print(by_score)
# [('Aisha', 91), ('Meera', 85), ('Ravi', 78)]

print(sorted(words, key=len))     # ['fig', 'apple', 'banana']`)}
${tip('Python\'s built-in sort is <strong>Timsort</strong> — a real-world hybrid of merge sort + insertion sort, O(n log n), and heavily optimized in C. In production code, <code>sorted()</code> wins. In interviews, knowing <em>how</em> merge sort works wins.')}
</div>`,

${scenario('🔑','Real-life scenario: lost keys',`<p>Your keys could be <em>anywhere</em> in the house, so you check room by room. On unsorted data that's the only option: <span class="chip y">O(n)</span>, no preparation needed.</p>`)}
${pyBlock('linear_search.py',`def linear_search(items, target):
    for i, item in enumerate(items):
        if item == target:
            return i          # found: return the position
    return -1                 # checked everything: not here

rooms = ["kitchen", "hall", "bedroom", "study"]
print(linear_search(rooms, "bedroom"))   # 2
print(linear_search(rooms, "garage"))    # -1`)}
</div>

<div class="card"><h3><span class="n">2</span>Binary search — the halving genius</h3>
${scenario('🎲','Scenario: the 1-to-100 guessing game',`<p>I think of a number between 1 and 100; you get "higher/lower" feedback. Nobody guesses 1, 2, 3… You guess <strong>50</strong>, then 75, then 63… Each guess <strong>kills half the possibilities</strong> — 100 numbers need at most 7 guesses. A billion needs 30. That's <span class="chip g">O(log n)</span>.</p>
<p>The only price of admission: the data must be <strong>sorted</strong>.</p>`)}
<div class="viz spaced">
<div class="cell lo">2<span class="idx">✂ discard</span></div><div class="cell lo">5</div><div class="cell lo">8</div>
<div class="cell hi">12<span class="idx">mid — too small!</span></div>
<div class="cell">16</div><div class="cell">23</div><div class="cell">38<span class="idx">target</span></div>
</div>
${pyBlock('binary_search.py',`def binary_search(sorted_items, target):
    low, high = 0, len(sorted_items) - 1

    while low &lt;= high:
        mid = (low + high) // 2
        guess = sorted_items[mid]

        if guess == target:
            return mid            # 🎯 found it
        elif guess &lt; target:
            low = mid + 1         # target lives in the RIGHT half
        else:
            high = mid - 1        # target lives in the LEFT half
    return -1

nums = [2, 5, 8, 12, 16, 23, 38, 56, 72, 91]
print(binary_search(nums, 23))   # 5
print(binary_search(nums, 20))   # -1`)}
${info('Python has it built in: <code>import bisect; bisect.bisect_left(nums, 23)</code> gives the insertion point in O(log n) — great for "find in sorted data" tasks.')}
${warn('The three classic binary-search bugs: (1) running it on <strong>unsorted</strong> data, (2) writing <code>low &lt; high</code> instead of <code>low &lt;= high</code> and missing single-element windows, (3) forgetting <code>mid ± 1</code> and looping forever.')}
</div>

<div class="card"><h3><span class="n">3</span>When is sorting first worth it?</h3>

<tr><td>Search many times in the same data</td><td>Sort once, then binary search each time</td><td><span class="chip y">O(n log n)</span> + <span class="chip g">O(log n)</span> per query</td></tr>

{
id:'dp', icon:'🧗', c1:'#232946', c2:'#5A5FE0',
title:'Dynamic Programming', sub:'Never solve the same problem twice',
tagline:'The final boss — and it\'s friendlier than its reputation. DP is just recursion (Unit 8) plus a notebook: solve each sub-problem once, write down the answer, reuse it forever.',
sections:`
<div class="card"><h3><span class="n">1</span>The mental model</h3>
${scenario('🧗','Real-life scenario: climbing stairs',`
<p>You climb a staircase taking <strong>1 or 2 steps</strong> at a time. How many distinct ways to reach step 5?</p>
<p>The insight: to stand on step 5, your <em>last move</em> came from step 4 (a 1-step) or step 3 (a 2-step). So:</p>
<p style="text-align:center"><strong>ways(5) = ways(4) + ways(3)</strong></p>
<p>Wait… each answer is the sum of the previous two? <strong>That's Fibonacci in disguise!</strong> Countless DP problems secretly reduce to a small recurrence like this.</p>`)}
<p>Every DP problem has two fingerprints — check for both:</p>
<ul>
<li><strong>Overlapping sub-problems:</strong> the naive recursion re-solves the same inputs again and again (ways(3) is needed by both ways(4) and ways(5)).</li>
<li><strong>Optimal substructure:</strong> the big answer is built from the answers to smaller versions.</li>
</ul>
</div>

<div class="card"><h3><span class="n">2</span>Two flavours: memoization vs tabulation</h3>
<h4>Top-down: recursion + a notebook (memoization)</h4>
${pyBlock('stairs_memo.py',`def ways(n, memo={}):
    if n in memo:
        return memo[n]        # 📓 already solved — reuse!
    if n &lt;= 1:
        return 1              # one way to stand still / take 1 step
    memo[n] = ways(n - 1, memo) + ways(n - 2, memo)
    return memo[n]

print(ways(5))     # 8
print(ways(40))    # 165580141 — instant (naive recursion would crawl)`)}
<h4>Bottom-up: fill a table from tiny to big (tabulation)</h4>
${pyBlock('stairs_table.py',`def ways(n):
    if n &lt;= 1:
        return 1
    table = [0] * (n + 1)
    table[0], table[1] = 1, 1
    for i in range(2, n + 1):          # solve smallest problems first
        table[i] = table[i - 1] + table[i - 2]
    return table[n]

print(ways(5))    # 8   -> table grows: [1, 1, 2, 3, 5, 8]`)}
${info('Same answers, opposite directions. <strong>Memoization</strong>: start big, recurse down, cache. <strong>Tabulation</strong>: start tiny, loop up, fill a table. Tabulation avoids recursion limits and is usually a touch faster; memoization is often easier to write first.')}
</div>

<div class="card"><h3><span class="n">3</span>A real optimization: the house robber</h3>
${scenario('💰','Scenario: adjacent-house alarms',`<p>Houses on a street hold cash: <code>[2, 7, 9, 3, 1]</code>. Robbing two <strong>adjacent</strong> houses triggers the alarm. What's the maximum haul?</p>
<p>At every house you face one clean choice: <strong>skip it</strong> (keep the best up to the previous house) or <strong>rob it</strong> (its cash + the best up to two houses back).</p>`)}
${pyBlock('house_robber.py',`def max_loot(houses):
    prev2, prev1 = 0, 0            # best totals: two back, one back
    for cash in houses:
        current = max(prev1,        # choice A: skip this house
                      prev2 + cash) # choice B: rob it
        prev2, prev1 = prev1, current
    return prev1

print(max_loot([2, 7, 9, 3, 1]))   # 12  -> rob houses with 2, 9, 1
print(max_loot([5, 3, 4, 11, 2]))  # 16  -> rob 5 and 11`)}
${tip('Notice we kept only <strong>two variables</strong> instead of a whole table — a common DP refinement from O(n) space down to O(1). The recurrence <code>best(i) = max(best(i-1), best(i-2) + cash)</code> is the entire algorithm.')}
</div>

<div class="card"><h3><span class="n">4</span>Your DP recipe (works on most problems)</h3>
<ol>
<li><strong>Define the state in words:</strong> "table[i] = the answer for the first i items." Writing this sentence is half the battle.</li>
<li><strong>Find the recurrence:</strong> how does state i come from earlier states? (Usually a max/min/sum of 1–3 previous entries.)</li>
<li><strong>Set base cases:</strong> the tiny answers you know outright.</li>
<li><strong>Pick a direction:</strong> memoize top-down or tabulate bottom-up.</li>
<li><strong>Optimize space</strong> if only the last few states are ever used.</li>
</ol>
${warn('DP mastery = pattern recognition + practice. Start with: Climbing Stairs, House Robber, Coin Change, Longest Common Subsequence. Each teaches one reusable state pattern.')}
</div>`,
quiz:[
{q:'The two fingerprints that say "this is a DP problem" are…',opts:['Sorted input and binary trees','Overlapping sub-problems and optimal substructure','Queues and stacks','Big inputs and small outputs'],a:1,why:'Repeated sub-problems make caching worthwhile; optimal substructure means small answers assemble into the big one.'},
{q:'Memoization differs from plain recursion by…',opts:['Using loops','Caching each sub-problem\'s answer so it\'s computed only once','Avoiding base cases','Sorting first'],a:1,why:'The cache (a dict!) collapses an exponential call tree into one call per distinct sub-problem — often O(2ⁿ) → O(n).'},
{q:'In House Robber, best(i) equals…',opts:['best(i-1) + cash[i]','max(best(i-1), best(i-2) + cash[i])','cash[i] always','best(i-2) always'],a:1,why:'Skip house i (keep best(i-1)) or rob it (cash[i] + best(i-2), since i-1 must be skipped). Take the better option.'}
]}
];

function answer(unitId, qi, oi, btn){
  const u = UNITS.find(x=>x.id===unitId);
  const q = u.quiz[qi];
  if(state.answered[unitId][qi]) return;

  const opts = btn.parentElement.querySelectorAll('.quiz-opt');
  opts.forEach(o=>o.disabled=true);
  opts[q.a].classList.add('correct');

  const why = document.getElementById('why-'+qi);
  if(oi===q.a){
    state.answered[unitId][qi]='correct';
    state.xp += 10;
    why.className='quiz-why show ok';
    why.textContent='✅ Correct! +10 XP — '+q.why;
    toast('⭐ +10 XP');
  } else {
    btn.classList.add('wrong');
    state.answered[unitId][qi]='wrong-'+oi;
    why.className='quiz-why show no';
    why.textContent='❌ Not quite. '+q.why;
  }

  const answeredCount = Object.keys(state.answered[unitId]).length;
  const fill=document.getElementById('unitFill'), lbl=document.getElementById('unitLbl');
  if(fill) fill.style.width = Math.round(answeredCount/u.quiz.length*100)+'%';
  if(lbl) lbl.textContent = lbl.textContent.replace(/quiz progress \d+\/\d+/, 'quiz progress '+answeredCount+'/'+u.quiz.length);

  if(answeredCount===u.quiz.length && !state.completed[unitId]){
    state.completed[unitId]=true;
    state.xp += 20;
    confettiBurst();
    setTimeout(()=>toast('🎉 Unit complete! +20 XP bonus'), 450);
  }
  refreshStats();
}

/* ---------- UTILITIES ---------- */
function copyCode(btn){
  const codeEl = btn.closest('.code-block').querySelector('pre code');
  const text = codeEl.textContent;
  const done = ()=>{ btn.classList.add('copied'); btn.textContent='✓ Copied!';
    setTimeout(()=>{ btn.classList.remove('copied'); btn.textContent='📋 Copy'; },1600); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  } else fallbackCopy(text,done);
}
function fallbackCopy(text,done){
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){}
  document.body.removeChild(ta);
}

let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

/* confetti */
function confettiBurst(){
  const cv=document.getElementById('confetti'), ctx=cv.getContext('2d');
  cv.width=innerWidth; cv.height=innerHeight;
  const colors=['#5A5FE0','#22B573','#FFB100','#F25C5C','#8B5CF6','#12A5B4'];
  const parts=Array.from({length:130},()=>({
    x:innerWidth/2+(Math.random()-0.5)*220, y:innerHeight*0.35,
    vx:(Math.random()-0.5)*11, vy:-(Math.random()*11+5),
    s:Math.random()*7+4, r:Math.random()*Math.PI,
    vr:(Math.random()-0.5)*0.3, c:colors[Math.floor(Math.random()*colors.length)]
  }));
  let frame=0;
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.32; p.r+=p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r);
      ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore();
    });
    if(++frame<130) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

/* init */
refreshStats();
showHome();
</script>
